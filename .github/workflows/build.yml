name: Build PyriteIDE CI/CD

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
            command: |
              export SERIOUS_PYTHON_SITE_PACKAGES="__pypackages__"
              dart run serious_python:main package python --platform Linux --requirements "--pre" --requirements "-rpython/requirements.txt" --asset "assets/linux/python.zip" --verbose
              flutter build apk --release --split-per-abi --verbose
            output_path: build/app/outputs/flutter-apk/*.apk
          - os: windows-latest
            target: windows
            command: |
              dart run serious_python:main package python --platform Windows --requirements "--pre" --requirements "-rpython/requirements.txt" --asset "assets/windows/python.zip" --verbose
              flutter build windows --release --verbose
            output_path: build/windows/runner/Release/*.exe
          - os: macos-latest
            target: macos
            command: |
              dart run serious_python:main package python --platform Darwin --requirements "--pre" --requirements "-rpython/requirements.txt" --asset "assets/macos/python.zip" --verbose
              flutter build macos --release --verbose
              cd build/macos/Build/Products/Release
              zip -r PyriteIDE.app.zip PyriteIDE.app
              cd -
            output_path: build/macos/Build/Products/Release/*.zip
          - os: ubuntu-latest
            target: linux
            command: |
              sudo apt-get update -y
              sudo apt-get install -y ninja-build libgtk-3-dev
              export SERIOUS_PYTHON_SITE_PACKAGES="/home/runner/work/pyrite-ide/pyrite-ide/build/linux/x64/release/__pypackages__"
              dart run serious_python:main package python --platform Linux --requirements "--pre" --requirements "-rpython/requirements.txt" --asset "assets/linux/python.zip" --verbose
              flutter build linux --release --verbose
              cd build/linux/x64/release
              tar -czf PyriteIDE-linux-x64.tar.gz bundle
              cd -
            output_path: build/linux/x64/release/*.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install automake and libtool
        if: matrix.target == 'macos'
        run: brew install automake libtool

      - name: Get dependencies
        run: flutter pub get

      - name: Build project
        run: ${{ matrix.command }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.output_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
