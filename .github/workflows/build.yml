name: Build PyriteIDE CI/CD

on:
  push:
    tags:
      - "v*"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.4"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze --no-fatal-infos lib test

  build:
    name: Build for ${{ matrix.target }}
    needs: analyze
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
            command: |
              export SERIOUS_PYTHON_SITE_PACKAGES="$GITHUB_WORKSPACE/assets/python_runtime_boot"
              dart run serious_python:main package "assets/python_runtime_boot" --platform Android --asset "assets/python_runtime_boot.zip" --verbose
              flutter build apk --release --split-per-abi --no-tree-shake-icons --verbose
            output_path: build/app/outputs/flutter-apk/*.apk

          - os: windows-latest
            target: windows
            command: |
              dart run serious_python:main package "assets/python_runtime_boot" --platform Windows --asset "assets/python_runtime_boot.zip" --verbose
              flutter build windows --release --verbose
              $releasePath = Join-Path $env:GITHUB_WORKSPACE "build\windows\x64\runner\Release"
              Compress-Archive -Path "$releasePath\*" -DestinationPath pyride-windows.zip
            output_path: pyride-windows.zip

          - os: macos-latest
            target: macos
            command: |
              dart run serious_python:main package "assets/python_runtime_boot" --platform Darwin --asset "assets/python_runtime_boot.zip" --verbose
              flutter build macos --release --no-tree-shake-icons --verbose
              cd build/macos/Build/Products/Release
              zip -r pyride-macos-darwin.zip PyriteIDE.app
              cd -
            output_path: build/macos/Build/Products/Release/*.zip

          - os: ubuntu-latest
            target: linux
            command: |
              export SERIOUS_PYTHON_SITE_PACKAGES="$GITHUB_WORKSPACE/assets/python_runtime_boot"
              dart run serious_python:main package "assets/python_runtime_boot" --platform Linux --asset "assets/python_runtime_boot.zip" --verbose
              flutter build linux --release --verbose
              cd build/linux/x64/release
              tar -czf pyride-linux-x64.tar.gz bundle
              cd -
            output_path: build/linux/x64/release/*.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.4"
          cache: true

      - name: Install automake and libtool
        if: matrix.target == 'macos'
        run: brew install automake libtool

      - name: Install linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev pkg-config libmpv-dev mpv

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build project
        run: ${{ matrix.command }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.output_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
